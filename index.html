<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Finca de Eventos</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">NOMBRE FINCA</div>
        <nav>
            <a href="#">INICIO</a>
            <a href="#">SERVICIOS</a>
            <a href="#">CONTACTO</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Titulo principal de pagina inicio</h1>
            <p>Subtitulo que pegue con nuestro titulo.</p>
            <button>Mas información</button>
        </div>
        <div class="hero-image">
            <div class="img-placeholder">ESPACIO PARA FOTO</div>
        </div>
    </section>

    <section class="galeria">
        <h2>Nuestros Espacios</h2>
        <div class="grid-container">
            <div class="grid-item">Espacio 1</div>
            <div class="grid-item">Espacio 2</div>
            <div class="grid-item">Espacio 3</div>
        </div>
    </section>

    <section class="historia">
        <h2>Una frase con enganche</h2>
        <p>Breve descripción del sitio, como puede ser el aforo, los metros de terreno, etc...</p>
    </section>

    <script src="js/main.js"></script>
