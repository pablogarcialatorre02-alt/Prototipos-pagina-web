    <main class="contenedor-principal">
        <p>Rellena el formulario y nos pondremos en contacto contigo lo antes posible.</p>

        <form action="#" method="POST" class="form-contacto">
            <input type="text" placeholder="Tu nombre" required>
            <input type="email" placeholder="Tu correo electrónico" required>
            <textarea placeholder="Cuéntanos tu idea" rows="5"></textarea>
            <button type="submit" class="btn-estilo btn-solido">Enviar mensaje</button>
        </form>
    </main>
